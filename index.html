<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decodificador Rápido</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Substituição de Incógnita</h1>
        <p class="description">Insira um código contendo o caractere "?" para gerar instantaneamente as 10 variações numéricas (de 9 a 0).</p>
        <input type="text" id="baseKey" placeholder="Cole o código com o '?' aqui..." maxlength="17">
        
        <div class="button-group">
            <button id="generateBtn">Gerar Variações</button>
            <button id="advancedBtn" class="secondary-btn">Copiar Lista (Macro)</button>
        </div>

        <div id="results"></div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
